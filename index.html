<style>

.start-card h2 { font-size: 1.25rem; font-weight: 700; color: #1e3a5f; margin-bottom: 10px; }
.start-card p { font-size: 0.88rem; color: #4a5568; line-height: 1.8; }

.tab-btn { padding: 10px 16px; border: none; background: transparent; font-size: 0.83rem; font-weight: 600; color: #718096; cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; }

<body>
<div class="header">
  <h1>台灣金融研訓院 第16屆<br>風險管理基本能力測驗</h1>
  <p>科目：風險管理制度與實務</p>

<div id="app"></div>

<script>
const RAW_QUESTIONS = [
  {id:1,pts:1.5,text:"本國 A 銀行於承作 5,000 萬美元放款時，同時發行 4,500 萬美元定期存單，借貸相抵後該行擁有多少美元外幣部位？",opts:["短部位 500 萬美元","短部位 5,000 萬美元","長部位 500 萬美元","長部位 5,000 萬美元"],ans:2},
  {id:2,pts:1.5,text:"銀行的外匯資產遠大於國外債務時，其外匯淨部位，簡稱為下列何者？",opts:["長部位","短部位","美金部位","歐元部位"],ans:0},
  {id:3,pts:1.5,text:"銀行的存款負債瀰漫著鉅額且異常的提領，可能帶來下列何種風險？",opts:["再投資風險","流動性風險","信用風險","市場風險"],ans:1},
  {id:4,pts:1.5,text:"利潤中心制度最好使用下列何者當作績效衡量指標？",opts:["營業利益","邊際貢獻","可控制利益","淨利(Net Income)"],ans:2},
  {id:5,pts:1.5,text:"有關銀行組織規劃，在總行轄下第一層級分別設立營業、信託、財務、國外等處級單位之設計架構稱為下列何者？",opts:["企業機能別","金融商品別","敏捷型組織","變形蟲組織"],ans:0},
  {id:6,pts:1.5,text:"有關營運利潤、會計利潤和財務利潤，下列敘述何者正確？",opts:["財務利潤=營運利潤+會計利潤","會計利潤=營運利潤+財務利潤","營運利潤=財務利潤+會計利潤","三者非屬相同會計基礎，無法衡量"],ans:1},
  {id:7,pts:1.5,text:"銀行整合組織目標與部門目標之管理機制，下列敘述何者錯誤？",opts:["單軌制的內部轉撥價格相較於多軌制的內部轉撥價格更能正確反映資金成本與政策目標","根據風險資本的配置系統(Capital Allocation System)，應將營業單位、業務項目和交易活動的所有風險，緊密地與銀行自有資本搭配","按照「風險值」衡量各項業務及主管的風險權限，可更客觀研判風險資本的配置與績效目標有否達成","總行財務處可以使用聯行往來的資金調撥系統，剖析分行等營業單位的營運利潤，並引導各項業務配合全行的經營政策"],ans:0},
  {id:8,pts:1.5,text:"有關應收帳款代收融資，下列何者正確？",opts:["應收帳款管理商無法向商品勞務供應者，追回墊付帳款時，稱為有追索權之應收帳款承購","有追索權的授信對象為應收帳款的讓與者（即商品勞務的賣方），無追索權的授信對象為應收帳款的還款者（即商品勞務的買方）","辦理應收帳款承購業務的銀行承擔過高流動性風險與信用風險時，可將部分應收帳款在初級市場轉售予其他銀行","辦理應收帳款承購業務的銀行發現商品勞務買方存在明顯不同的信用等級時，無須自行負擔保險費用（一般無法要求應收帳款讓與者額外負擔保險費用），即可降低信用風險"],ans:1},
  {id:9,pts:1.5,text:"企業授信案件之訂價原則，應考慮下列哪些風險貼水因子？ A.信用等級加碼 B.借款期別加碼 C.擔保品成數或比例加碼 D.授信展望加減碼",opts:["僅 AC","僅 BD","僅 ABC","ABCD"],ans:3},
  {id:10,pts:1.5,text:"針對授信契約的保障條款，下列何者不屬於正向條款？",opts:["借戶須定期陳送財務報表","借戶未獲得債權銀行同意，不得發行新債","借戶的利息保障倍數須大於 3","借戶的資產報酬率須大於 5%"],ans:1},
  {id:11,pts:1.5,text:"有關財務比率的敘述，下列何者不適當？",opts:["負債對淨值的比率越高，借戶的財務結構越不健全","財務費用率越高，借戶的財務運用越不適當","固定長期適合率小於 1，表示借戶「以短支長」，易造成短期資金不足","借戶的淨值報酬率越高，意味獲利表現越好"],ans:2},
  {id:12,pts:1.5,text:"購置住宅貸款之借款客戶要降低還本付息壓力，可在最初幾年申請「寬限期」，意指這段期間的還款方式為下列何者？",opts:["付息不還本","還本不付息","不還本不付息","少還本少付息"],ans:0},
  {id:13,pts:1.5,text:"假設 ARMs 定儲利率指數為 2.5%，銀行承作房貸之成本加碼為 2.55%，企業金融業務有關違約風險之信用等級加碼為 1%，請根據 ARMs 房貸之利率訂價方式，計算房貸利率為何？",opts:["6.05%","5.05%","3.55%","3.50%"],ans:1},
  {id:14,pts:1.5,text:"依據穆迪信評公司之定義，下列何種等級（含）以上可視為投資等級？",opts:["Aaa","A","Baa","Caa"],ans:2},
  {id:15,pts:1.5,text:"國際信評機構的評等收費不低，所以借款企業在籌措哪種資金，通常不會申請受評？",opts:["在日本發行普通公司債","在英國發行轉換公司債","發行美國存託憑證","向本國銀行融資借款"],ans:3},
  {id:16,pts:1.5,text:"銀行依照授信法規，對「所有利害關係人」的擔保授信總餘額，不得超過銀行淨值多少倍數？",opts:["1 倍","1.5 倍","2 倍","2.5 倍"],ans:1},
  {id:17,pts:1.5,text:"為避免承擔過高的信用風險，銀行會以客戶和產業為對象訂定風險限額。經由銀行內部自建的評等模型，計算出「表內業務」的風險限額稱為下列何者？",opts:["信用風險值","授信總餘額","融資額度","信用暴險額"],ans:0},
  {id:18,pts:1.5,text:"授信業務的集中性風險，主要針對哪種授信特徵而衡量？",opts:["關係企業","利害關係人","產業","國家"],ans:2},
  {id:19,pts:1.5,text:"已知 A 銀行之總資產為 6,000 億元和淨值為 800 億元，下列敘述何者正確？",opts:["A 銀行對同一自然人之授信總餘額不得超過 30 億元","A 銀行對同一自然人之無擔保授信總餘額不得超過 8 億元","A 銀行對同一法人之授信總餘額不得超過 100 億元","A 銀行對同一法人之無擔保授信總餘額不得超過 80 億元"],ans:1},
  {id:20,pts:1.5,text:"開發中國家致力於國內基礎建設，為籌措建設資金而向國際資本市場大量舉債，但借款國家經濟良窳影響未來的償債能力。銀行稱此風險為下列何者？",opts:["主權風險","匯兌風險","外匯移轉風險","政治風險"],ans:0},
  {id:21,pts:1.5,text:"有關信用違約交換（Credit Default Swap;簡稱 CDS）的特性與應用，下列敘述何者不合理？",opts:["該指標可檢視交易對手國於國際金融市場的信用狀況","CDS 加碼 101 基點，等於 1.01%","單一事件造成某國 CDS 價格低於原來標準，且連續發生數日時，銀行可能凍結該國的風險限額","單一事件造成某國 CDS 價格高於原來標準，且連續發生數日時，銀行可能凍結該國的風險限額"],ans:2},
  {id:22,pts:1.5,text:"依據銀行資本適足性及資本等級管理辦法，槓桿比率係指下列何者？",opts:["第一類資本淨額 / 暴險總額","第一類資本淨額 / 總資產","合格資本 / 暴險總額","總負債 / 總資產"],ans:0},
  {id:23,pts:1.5,text:"有關銀行的業務限制，下列敘述何者錯誤？",opts:["資本不足者，主管機關得限制新增風險性資產","資本顯著不足者，主管機關得限制轉投資","資本不足者，主管機關得禁止與利害關係人授信或其他交易","資本顯著不足者，主管機關得限制存款利率不得超過其他銀行同性質存款"],ans:2},
  {id:24,pts:1.5,text:"票券金融公司的資本適足率在 6%以上，未達 8%，主管機關得採行下列哪些措施？ A.不得以現金分配盈餘 B.不得以現金買回流通在外股份 C.限期提出資本重建計畫 D.限期提出財務業務改善計畫",opts:["僅 ABC","僅 CD","僅 BCD","ABCD"],ans:3},
  {id:25,pts:1.5,text:"下列何種風險較不屬於人身保險業的風險項目？",opts:["資產風險","信用風險","保險風險","利率風險"],ans:1},
  {id:26,pts:1.5,text:"保險公司申請從事衍生性金融商品交易之資格，請問其資本適足率至少須達多少以上？",opts:["150%","200%","250%","300%"],ans:2},
  {id:27,pts:1.5,text:"國際清算銀行(Bank for International Settlements, BIS)之巴賽爾委員會推動資本適足管理，針對授信業務的風險管理制度，除傳統指標外，透過內部評等法(Internal Rating-Based Approach, IRB)開始重視風險量化指標，但不包括下列何者？",opts:["違約風險","暴露風險","回收風險","市場風險"],ans:3},
  {id:28,pts:1.5,text:"下列金融業務何者較不會衍生信用風險？",opts:["應收帳款承購業務","財富管理業務","自用住宅貸款業務","擔保信用狀業務"],ans:1},
  {id:29,pts:1.5,text:"下列何種違約屬於「尚未履行付款義務」的違約？ A.逾期放款 B.經濟違約 C.技術性違約 D.預借現金 E.催收款",opts:["僅 AB","僅 AE","僅 ACD","僅 CDE"],ans:1},

  {id:31,pts:1.5,text:"有關不良授信資產，下列述敘何者錯誤？",opts:["不良授信資產比率為不良授信資產除以總授信資產之比率","不良授信資產係指第三類可望收回者至第五類收回無望者之授信資產合計","逾期放款比率為逾期放款（依法認列，還包括催收款及呆帳）對放款總額之比率","備抵呆帳覆蓋率為備抵呆帳對逾期放款（依法認列，還包括催收款及呆帳）之比率"],ans:1},

const LABELS = ['(1)','(2)','(3)','(4)'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuiz() {
  return shuffle(RAW_QUESTIONS).map(q => {
    const idxs = shuffle([0,1,2,3]);
    return { ...q, displayOpts: idxs.map(i=>q.opts[i]), displayAns: idxs.indexOf(q.ans) };
  });
}

let questions=[], current=0, userAnswers=[], answered=[], tab='quiz';

function init() {
  questions = buildQuiz();
  current = 0;
  userAnswers = new Array(60).fill(-1);
  answered = new Array(60).fill(false);
  tab = 'quiz';
  render();
}

function calcScore() {
  return questions.reduce((s,q,i) => s + (answered[i] && userAnswers[i]===q.displayAns ? q.pts : 0), 0);
}

function render() {
  if (tab === 'result') { renderResult(); return; }
  if (tab === 'start') { renderStart(); return; }
  renderQuiz();
}

function renderStart() {
  document.getElementById('app').innerHTML = `
    <div class="main">
      <div class="start-card">
        <h2>📚 風險管理基本能力測驗</h2>
        <p>台灣金融研訓院 第 16 屆</p>
        <div class="start-info">
          <ul>
            <li>共 60 題，滿分 100 分，及格 70 分</li>
            <li>第 1–40 題（第一部分），每題 1.5 分</li>
            <li>第 41–60 題（第二部分），每題 2 分</li>
            <li>每次測驗題目順序與選項順序均隨機排列</li>
            <li>選完即時顯示對錯，答錯不倒扣</li>
          </ul>
        </div>
        <button class="btn btn-primary" onclick="init()" style="font-size:1rem;padding:14px 40px;margin-top:8px">開始測驗 🚀</button>
      </div>
    </div>`;
}

function renderQuiz() {
  const q = questions[current];
  const isAns = answered[current];
  const ua = userAnswers[current];
  const score = calcScore();
  const pct = Math.round((current/60)*100);
  const doneCount = answered.filter(Boolean).length;

  document.getElementById('app').innerHTML = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-info">
      <span>第 <strong>${current+1}</strong> / 60 題</span>
      <span class="score-badge">目前 ${score.toFixed(1)} 分</span>
      <span>已答 ${doneCount}/60</span>
    </div>
    <div class="main">
      <div class="question-card">
        <div class="question-meta">
          <span class="q-num">原題 #${q.id}</span>
          <span class="q-pts">${q.pts} 分</span>
          <span class="q-part">${q.id<=40?'第一部分':'第二部分'}</span>
        </div>
        <div class="question-text">${q.text}</div>
        <div class="options">
          ${q.displayOpts.map((opt,i)=>{
            let cls='';
            if(isAns){
              if(i===q.displayAns) cls = 'correct';
              else if(ua===i) cls = 'wrong';
            }
            return `<button class="option-btn ${cls}" onclick="selectAnswer(${i})" ${isAns?'disabled':''}>
              <span class="option-label">${LABELS[i]}</span><span>${opt}</span>
            </button>`;
          }).join('')}
        </div>
        ${isAns ? `<div class="feedback ${ua===q.displayAns?'correct':'wrong'}">
          ${ua===q.displayAns ? '✅ 答對！得 '+q.pts+' 分' : '❌ 答錯。正確答案：'+LABELS[q.displayAns]+'　'+q.displayOpts[q.displayAns]}
        </div>` : ''}
      </div>

      <div style="background:white;border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.07);">
        <div style="font-size:0.78rem;color:#718096;margin-bottom:8px;text-align:center">快速跳題（綠=答對 紅=答錯 灰=未答）</div>
        <div class="q-nav">
          ${questions.map((_,i)=>{
            let cls = 'unanswered';
            if(answered[i]) cls = userAnswers[i]===questions[i].displayAns ? 'correct-dot' : 'wrong-dot';
            if(i===current) cls += ' current-dot';
            return `<button class="q-dot ${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="nav-bar">
      <button class="btn btn-secondary" onclick="go(-1)" ${current===0?'disabled':''}>← 上一題</button>
      ${current<59 ? `<button class="btn btn-primary" onclick="go(1)">下一題 →</button>` : `<button class="btn btn-danger" onclick="tab='result';render()">完成測驗 ✓</button>`}
      <button class="btn btn-secondary" onclick="tab='result';render()">查看成績</button>
    </div>`;
}

function renderResult() {
  let score=0, correct=0, wrong=0, skip=0;
  questions.forEach((q,i)=>{
    if(!answered[i]){skip++;return;}
    if(userAnswers[i]===q.displayAns){score+=q.pts;correct++;}
    else wrong++;
  });
  const pass = score>=70;

  const reviewHtml = questions.map((q,i)=>{
    const ua = userAnswers[i];
    const isR = answered[i] && ua===q.displayAns;
    const isW = answered[i] && ua!==q.displayAns;
    return `<div class="review-item ${isR?'right-q':isW?'wrong-q':'skip-q'}">
      <div class="review-status ${isR?'ok':isW?'ng':'sk'}">${isR?'✅ 答對':isW?'❌ 答錯':'⬜ 未作答'} — 原題 #${q.id}（${q.pts}分）</div>
      <div class="review-qtext">${q.text}</div>
      <div class="review-ans">
        ${answered[i]?`你的答案：<span class="my">${LABELS[ua]} ${q.displayOpts[ua]}</span><br>`:''}
        正確答案：<span class="right">${LABELS[q.displayAns]} ${q.displayOpts[q.displayAns]}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="main">
      <div class="result-card">
        <div class="result-score">${score.toFixed(1)}</div>
        <div class="result-label">/ 100 分</div>
        <div class="result-grade" style="color:${pass?'#38a169':'#e53e3e'}">${pass?'🎉 恭喜通過！':'繼續加油！未達及格'}</div>
        <div class="result-detail">
          <div class="result-item"><div class="result-item-val" style="color:#38a169">${correct}</div><div class="result-item-lbl">答對</div></div>
          <div class="result-item"><div class="result-item-val" style="color:#e53e3e">${wrong}</div><div class="result-item-lbl">答錯</div></div>
          <div class="result-item"><div class="result-item-val" style="color:#a0aec0">${skip}</div><div class="result-item-lbl">未答</div></div>
        </div>
        <p style="font-size:0.82rem;color:#718096;margin-bottom:20px">及格標準 70 分</p>
        <button class="btn btn-primary" onclick="init()" style="margin-right:8px">🔄 重新測驗</button>
        <button class="btn btn-secondary" onclick="tab='quiz';render()">← 繼續作答</button>
      </div>
      <div class="review-section">
        <h3>📋 所有題目解析</h3>
        ${reviewHtml}
      </div>
    </div>`;
}

function selectAnswer(i) {
  if(answered[current]) return;
  userAnswers[current] = i;
  answered[current] = true;
  render();
}

function go(dir) {
  current = Math.max(0, Math.min(59, current+dir));
  render();
}

function jumpTo(i) {
  current = i;
  tab = 'quiz';
  render();
}

// Boot
tab = 'start';
render();
</script>
</body>
